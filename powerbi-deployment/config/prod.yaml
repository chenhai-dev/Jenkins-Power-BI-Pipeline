# =============================================================================
# Power BI Deployment Configuration - PRODUCTION
# =============================================================================
# Sensitive values are references to Key Vault secrets, NOT the secrets themselves.

environment: Prod

# ---- Authentication ---------------------------------------------------------
auth:
  tenantId: "00000000-0000-0000-0000-000000000000"      # Azure AD tenant
  clientId: "11111111-1111-1111-1111-111111111111"      # Service principal app ID
  clientSecretName: "sp-powerbi-deploy-prod-secret"     # Name of secret in Key Vault

# ---- Secrets backend --------------------------------------------------------
keyVault:
  name: "kv-powerbi-prod"
  resourceGroup: "rg-analytics-prod"

# ---- Target workspace -------------------------------------------------------
workspace:
  name: "Enterprise-Analytics-PROD"
  capacityId: "22222222-2222-2222-2222-222222222222"    # Premium P1+ or Fabric F64+
  createIfMissing: false                                # PROD: workspace must pre-exist

# ---- Data source credentials ------------------------------------------------
dataSource:
  credentialType: "Basic"
  usernameSecretName: "sql-reporting-user-prod"
  passwordSecretName: "sql-reporting-password-prod"
  encryptedConnection: "Encrypted"
  privacyLevel: "Organizational"

# ---- Per-report overrides ---------------------------------------------------
reports:
  - fileName: "SalesDashboard.pbix"
    displayName: "Sales Dashboard"
    parameters:
      SqlServerName: "sql-prod.database.windows.net"
      DatabaseName: "SalesDW_Prod"
      Environment: "Production"

  - fileName: "FinancePaginated.rdl"
    displayName: "Finance Monthly Report"
    # .rdl parameters handled in the report definition itself

  - fileName: "ExecutiveKPIs.pbix"
    displayName: "Executive KPIs"
    parameters:
      SqlServerName: "sql-prod.database.windows.net"
      DatabaseName: "EnterpriseKPI"

# ---- Post-deploy refresh ----------------------------------------------------
refresh:
  enabled: true
  notifyOnFailure: true
  notificationEmails:
    - "dataplatform-oncall@example.com"

# ---- Gate / approval --------------------------------------------------------
approval:
  required: true
  approvers:
    - "data-platform-leads@example.com"
