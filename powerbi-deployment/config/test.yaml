# Power BI Deployment Configuration - TEST / UAT
environment: Test

auth:
  tenantId: "00000000-0000-0000-0000-000000000000"
  clientId: "55555555-5555-5555-5555-555555555555"
  clientSecretName: "sp-powerbi-deploy-test-secret"

keyVault:
  name: "kv-powerbi-test"
  resourceGroup: "rg-analytics-test"

workspace:
  name: "Enterprise-Analytics-TEST"
  capacityId: "44444444-4444-4444-4444-444444444444"
  createIfMissing: false

dataSource:
  credentialType: "Basic"
  usernameSecretName: "sql-reporting-user-test"
  passwordSecretName: "sql-reporting-password-test"
  encryptedConnection: "Encrypted"
  privacyLevel: "Organizational"

reports:
  - fileName: "SalesDashboard.pbix"
    displayName: "Sales Dashboard [TEST]"
    parameters:
      SqlServerName: "sql-test.database.windows.net"
      DatabaseName: "SalesDW_Test"
      Environment: "Test"

  - fileName: "FinancePaginated.rdl"
    displayName: "Finance Monthly Report [TEST]"

  - fileName: "ExecutiveKPIs.pbix"
    displayName: "Executive KPIs [TEST]"
    parameters:
      SqlServerName: "sql-test.database.windows.net"
      DatabaseName: "EnterpriseKPI_Test"

refresh:
  enabled: true
  notifyOnFailure: true
  notificationEmails:
    - "qa-analytics@example.com"

approval:
  required: true
  approvers:
    - "qa-leads@example.com"
