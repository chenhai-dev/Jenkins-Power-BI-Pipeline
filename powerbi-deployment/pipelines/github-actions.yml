# =============================================================================
# Power BI Report Deployment - GitHub Actions Workflow
# =============================================================================

name: Deploy Power BI Reports

on:
  push:
    branches: [main, 'release/**']
    paths:
      - 'reports/**'
      - 'modules/**'
      - 'scripts/**'
      - 'config/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'reports/**'
      - 'modules/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        type: choice
        options: [Dev, Test, Prod]
        default: Dev

permissions:
  id-token: write    # OIDC federated auth to Azure
  contents: read

concurrency:
  group: powerbi-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  validate:
    name: Validate & Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PS modules
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer, Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning
          if ($issues) { $issues | Format-Table -AutoSize; exit 1 }

      - name: Pester
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputPath = 'test-results.xml'
          Invoke-Pester -Configuration $cfg

      - name: Pre-deployment validation
        shell: pwsh
        run: |
          Install-Module powershell-yaml -Force -Scope CurrentUser -AcceptLicense
          ./scripts/Invoke-PreDeploymentValidation.ps1 `
            -ArtifactPath ./reports `
            -Environment Prod `
            -ConfigPath ./config/prod.yaml

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-${{ github.run_id }}
          path: ./reports/validation-results.json
          retention-days: 30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: powerbi-reports
          path: |
            reports/
            modules/
            scripts/
            config/
          retention-days: 30

  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to Dev
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    environment: powerbi-dev
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: powerbi-reports

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Deploy
        shell: pwsh
        run: |
          Install-Module MicrosoftPowerBIMgmt, powershell-yaml, Az.KeyVault -Force -Scope CurrentUser -AcceptLicense
          ./scripts/Deploy-PowerBIReport.ps1 -Environment Dev -ConfigPath ./config/dev.yaml -ArtifactPath ./reports

  # ---------------------------------------------------------------------------
  deploy-test:
    name: Deploy to Test
    needs: deploy-dev
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    environment: powerbi-test    # Protection rule w/ reviewers set in repo settings
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: powerbi-reports

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Deploy
        shell: pwsh
        run: |
          Install-Module MicrosoftPowerBIMgmt, powershell-yaml, Az.KeyVault -Force -Scope CurrentUser -AcceptLicense
          ./scripts/Deploy-PowerBIReport.ps1 -Environment Test -ConfigPath ./config/test.yaml -ArtifactPath ./reports

  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Prod
    needs: deploy-test
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: windows-latest
    environment: powerbi-prod    # Manual approval gate configured here
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: powerbi-reports

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Deploy
        shell: pwsh
        run: |
          Install-Module MicrosoftPowerBIMgmt, powershell-yaml, Az.KeyVault -Force -Scope CurrentUser -AcceptLicense
          ./scripts/Deploy-PowerBIReport.ps1 -Environment Prod -ConfigPath ./config/prod.yaml -ArtifactPath ./reports

      - name: Upload deployment summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-deployment-summary-${{ github.run_id }}
          path: reports/deployment-summary.json
