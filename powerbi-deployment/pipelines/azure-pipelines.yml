# =============================================================================
# Power BI Report Deployment - Azure DevOps Pipeline
# =============================================================================
# Triggers on changes to reports/ or pipeline/module code.
# Promotes through Dev -> Test -> Prod with approval gates.

name: PowerBI-Deploy-$(Date:yyyyMMdd)-$(Rev:rr)

trigger:
  branches:
    include:
      - main
      - release/*
  paths:
    include:
      - reports/**
      - modules/**
      - scripts/**
      - pipelines/**
      - config/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - reports/**
      - modules/**
      - scripts/**

variables:
  - name: powershellVersion
    value: '7.4.0'
  - name: artifactName
    value: 'powerbi-reports'
  - group: 'powerbi-shared'   # Azure DevOps variable group backed by Key Vault

stages:
# -----------------------------------------------------------------------------
# Stage 1: Validate & Package
# -----------------------------------------------------------------------------
- stage: Validate
  displayName: 'Validate & Package Reports'
  jobs:
  - job: Lint
    displayName: 'Lint scripts & validate artifacts'
    pool:
      vmImage: 'windows-latest'
    steps:
      - checkout: self
        fetchDepth: 1

      - task: PowerShell@2
        displayName: 'Install PSScriptAnalyzer'
        inputs:
          targetType: 'inline'
          script: |
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
            Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0
          pwsh: true

      - task: PowerShell@2
        displayName: 'PSScriptAnalyzer'
        inputs:
          targetType: 'inline'
          script: |
            $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning
            if ($results) {
              $results | Format-Table -AutoSize
              Write-Error "Linting failed. Fix issues above."
              exit 1
            }
          pwsh: true

      - task: PowerShell@2
        displayName: 'Pester unit tests'
        inputs:
          targetType: 'inline'
          script: |
            Import-Module Pester -MinimumVersion 5.0
            $cfg = New-PesterConfiguration
            $cfg.Run.Path = './tests'
            $cfg.Output.Verbosity = 'Detailed'
            $cfg.TestResult.Enabled = $true
            $cfg.TestResult.OutputPath = 'test-results.xml'
            Invoke-Pester -Configuration $cfg
          pwsh: true

      - task: PublishTestResults@2
        displayName: 'Publish Pester results'
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: 'NUnit'
          testResultsFiles: 'test-results.xml'

      - task: PowerShell@2
        displayName: 'Pre-deployment validation (secret scan, size, naming, schema)'
        inputs:
          targetType: 'inline'
          script: |
            Install-Module powershell-yaml -Force -Scope CurrentUser -AcceptLicense
            # Validate against strictest profile (Prod)
            ./scripts/Invoke-PreDeploymentValidation.ps1 `
              -ArtifactPath ./reports `
              -Environment Prod `
              -ConfigPath ./config/prod.yaml
          pwsh: true

      - task: PublishPipelineArtifact@1
        displayName: 'Publish validation results'
        condition: always()
        inputs:
          targetPath: './reports/validation-results.json'
          artifactName: 'validation-results-$(Build.BuildId)'

      - task: CopyFiles@2
        displayName: 'Stage artifacts'
        inputs:
          SourceFolder: '$(Build.SourcesDirectory)'
          Contents: |
            reports/**/*.pbix
            reports/**/*.rdl
            modules/**
            scripts/**
            config/**
          TargetFolder: '$(Build.ArtifactStagingDirectory)'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish pipeline artifact'
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifactName: $(artifactName)

# -----------------------------------------------------------------------------
# Stage 2: Dev
# -----------------------------------------------------------------------------
- stage: DeployDev
  displayName: 'Deploy to DEV'
  dependsOn: Validate
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - deployment: DeployDev
    environment: 'powerbi-dev'
    pool:
      vmImage: 'windows-latest'
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: $(artifactName)

            - task: AzureCLI@2
              displayName: 'Deploy to Dev workspace'
              inputs:
                azureSubscription: 'sc-powerbi-dev'     # Azure DevOps service connection
                scriptType: 'pscore'
                scriptLocation: 'inlineScript'
                inlineScript: |
                  Install-Module MicrosoftPowerBIMgmt -Force -Scope CurrentUser -AcceptLicense
                  Install-Module powershell-yaml -Force -Scope CurrentUser -AcceptLicense
                  Install-Module Az.KeyVault -Force -Scope CurrentUser -AcceptLicense

                  & "$(Pipeline.Workspace)/$(artifactName)/scripts/Deploy-PowerBIReport.ps1" `
                    -Environment Dev `
                    -ConfigPath "$(Pipeline.Workspace)/$(artifactName)/config/dev.yaml" `
                    -ArtifactPath "$(Pipeline.Workspace)/$(artifactName)/reports"

# -----------------------------------------------------------------------------
# Stage 3: Test
# -----------------------------------------------------------------------------
- stage: DeployTest
  displayName: 'Deploy to TEST'
  dependsOn: DeployDev
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - deployment: DeployTest
    environment: 'powerbi-test'   # Configure approval gate on this environment in Azure DevOps UI
    pool:
      vmImage: 'windows-latest'
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: $(artifactName)

            - task: AzureCLI@2
              displayName: 'Deploy to Test workspace'
              inputs:
                azureSubscription: 'sc-powerbi-test'
                scriptType: 'pscore'
                scriptLocation: 'inlineScript'
                inlineScript: |
                  Install-Module MicrosoftPowerBIMgmt -Force -Scope CurrentUser -AcceptLicense
                  Install-Module powershell-yaml -Force -Scope CurrentUser -AcceptLicense
                  Install-Module Az.KeyVault -Force -Scope CurrentUser -AcceptLicense

                  & "$(Pipeline.Workspace)/$(artifactName)/scripts/Deploy-PowerBIReport.ps1" `
                    -Environment Test `
                    -ConfigPath "$(Pipeline.Workspace)/$(artifactName)/config/test.yaml" `
                    -ArtifactPath "$(Pipeline.Workspace)/$(artifactName)/reports"

# -----------------------------------------------------------------------------
# Stage 4: Prod (gated)
# -----------------------------------------------------------------------------
- stage: DeployProd
  displayName: 'Deploy to PROD'
  dependsOn: DeployTest
  condition: |
    and(
      succeeded(),
      or(
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
      )
    )
  jobs:
  - deployment: DeployProd
    environment: 'powerbi-prod'   # Approval gate + business-hours check configured here
    pool:
      vmImage: 'windows-latest'
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: $(artifactName)

            - task: AzureCLI@2
              displayName: 'Deploy to Prod workspace'
              inputs:
                azureSubscription: 'sc-powerbi-prod'
                scriptType: 'pscore'
                scriptLocation: 'inlineScript'
                inlineScript: |
                  Install-Module MicrosoftPowerBIMgmt -Force -Scope CurrentUser -AcceptLicense
                  Install-Module powershell-yaml -Force -Scope CurrentUser -AcceptLicense
                  Install-Module Az.KeyVault -Force -Scope CurrentUser -AcceptLicense

                  & "$(Pipeline.Workspace)/$(artifactName)/scripts/Deploy-PowerBIReport.ps1" `
                    -Environment Prod `
                    -ConfigPath "$(Pipeline.Workspace)/$(artifactName)/config/prod.yaml" `
                    -ArtifactPath "$(Pipeline.Workspace)/$(artifactName)/reports"

            - task: PublishPipelineArtifact@1
              displayName: 'Publish deployment summary'
              condition: always()
              inputs:
                targetPath: '$(Pipeline.Workspace)/$(artifactName)/reports/deployment-summary.json'
                artifactName: 'prod-deployment-summary-$(Build.BuildId)'
